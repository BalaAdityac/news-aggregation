version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: news_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: news_aggregation

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override mongo URL so it resolves the 'mongo' service name inside Docker
      MONGODB_URL: mongodb://mongo:27017
    depends_on:
      - mongo

volumes:
  mongo_data:
